name: Build APK (Signed)

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04   # 🔥 IMPORTANT FIX

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            libffi-dev \
            libssl-dev \
            python3-dev \
            zlib1g-dev \
            libncurses5 \
            libncurses5-dev \
            libtinfo5 \
            autoconf \
            automake \
            libtool \
            pkg-config \
            git \
            zip \
            unzip \
            openjdk-17-jdk

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.36

      - name: Clean previous builds
        run: buildozer android clean

      # 🔐 Decode Keystore (IMPORTANT)
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > mykeystore.keystore

      - name: Build APK
        run: |
          buildozer -v android release

      - name: Sign APK
        run: |
          jarsigner -verbose -sigalg SHA1withRSA -digestalg SHA1 \
          -keystore mykeystore.keystore \
          -storepass ${{ secrets.KEYSTORE_PASSWORD }} \
          bin/*.apk ${{ secrets.KEY_ALIAS }}

      - name: Zipalign APK
        run: |
          zipalign -v 4 bin/*.apk app-release.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RC-Controller-APK
          path: app-release.apk
