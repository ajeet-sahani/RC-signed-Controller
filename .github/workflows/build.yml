name: Build APK (Signed)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      BUILDOZER_ALLOW_ROOT: 1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            libffi-dev \
            libssl-dev \
            python3-dev \
            zlib1g-dev \
            libncurses5 \
            libncurses5-dev \
            libtinfo5 \
            autoconf \
            automake \
            libtool \
            pkg-config \
            git \
            zip \
            unzip \
            openjdk-17-jdk

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install cython==0.29.36 buildozer

      # 🔐 Decode keystore
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > mykeystore.keystore

      # 🚀 Build APK (FIRST TIME download + build)
      - name: Build APK
        run: |
          buildozer -v android release

      # 🔏 Sign APK
      - name: Sign APK
        run: |
          jarsigner -verbose -sigalg SHA1withRSA -digestalg SHA1 \
          -keystore mykeystore.keystore \
          -storepass ${{ secrets.KEYSTORE_PASSWORD }} \
          bin/*.apk ${{ secrets.KEY_ALIAS }}

      # 📦 Align APK
      - name: Zipalign APK
        run: |
          zipalign -v 4 bin/*.apk app-release.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RC-Controller-APK
          path: app-release.apk
